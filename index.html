<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro 25 años</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b1c2c;
  color:white;
  overflow-x:hidden;
}

#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

section{
  position:relative;
  z-index:2;
  text-align:center;
  padding-top:80px;
}

/* LOGO */
.logo-title{
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 15px;
}

.logo{
  height:60px;
}

/* TEXTO 25 */
.hidden-text{
  opacity:0;
  transform:scale(0.8);
  transition:all 0.6s ease;
  font-size:42px;
  font-weight:600;
}

.show-text{
  opacity:1;
  transform:scale(1);
  text-shadow: 0 0 10px #00eaff, 0 0 25px #00eaff, 0 0 40px #00eaff;
}

/* CANVAS MAGIA */
#magicCanvas{
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  pointer-events:none;
}

/* SUBTITLE */
.subtitle{
  margin-top:20px;
  opacity:0.8;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

.time-box{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:10px;
  min-width:70px;
}

.time-box span{
  font-size:22px;
  font-weight:bold;
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#00eaff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:10;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:600px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<section>

<h1 class="logo-title">
  <img src="img/logo-liberty.png" class="logo">
  <span id="text25" class="hidden-text">25 AÑOS</span>
  <canvas id="magicCanvas"></canvas>
</h1>

<div class="subtitle">Gracias por acompañarnos en este camino.</div>

<div class="countdown">
  <div class="time-box"><span id="days">00</span><p>Días</p></div>
  <div class="time-box"><span id="hours">00</span><p>Horas</p></div>
  <div class="time-box"><span id="minutes">00</span><p>Min</p></div>
  <div class="time-box"><span id="seconds">00</span><p>Seg</p></div>
</div>

<button class="btn" onclick="openModal()">REGISTRO</button>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✕</span>

<script src="https://cdn.tickettailor.com/js/widgets/min/widget.js"
data-url="https://www.tickettailor.com/all-tickets/jose7/?ref=website_widget"
data-type="inline"></script>

  </div>
</div>

<!-- PARTICULAS FONDO -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let particles = [];

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.6;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
  }

  draw() {
    ctx.fillStyle = "rgba(0,200,255,0.6)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function animateParticles(){
  ctx.clearRect(0,0,w,h);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animateParticles);
}

for(let i=0;i<120;i++) particles.push(new Particle());
animateParticles();
</script>

<!-- EFECTO MAGICO -->
<script>
const canvasMagic = document.getElementById("magicCanvas");
const ctxMagic = canvasMagic.getContext("2d");

const text = document.getElementById("text25");

canvasMagic.width = 400;
canvasMagic.height = 120;

let particlesMagic = [];
let progress = 0;

class Spark {
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.size=Math.random()*3+1;
    this.speedX=Math.random()*2+1;
    this.speedY=(Math.random()-0.5)*2;
    this.life=60;
  }

  update(){
    this.x+=this.speedX;
    this.y+=this.speedY;
    this.life--;
  }

  draw(){
    ctxMagic.fillStyle=`rgba(0,255,255,${this.life/60})`;
    ctxMagic.beginPath();
    ctxMagic.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctxMagic.fill();
  }
}

function animateMagic(){
  ctxMagic.clearRect(0,0,400,120);

  let x=progress;
  let y=60 + Math.sin(progress*0.05)*10;

  for(let i=0;i<5;i++){
    particlesMagic.push(new Spark(x,y));
  }

  ctxMagic.beginPath();
  ctxMagic.moveTo(0,60);
  ctxMagic.lineTo(x,y);
  ctxMagic.strokeStyle="#00eaff";
  ctxMagic.lineWidth=2;
  ctxMagic.shadowBlur=15;
  ctxMagic.shadowColor="#00eaff";
  ctxMagic.stroke();

  particlesMagic.forEach((p,i)=>{
    p.update();
    p.draw();
    if(p.life<=0) particlesMagic.splice(i,1);
  });

  progress+=6;

  if(progress<320){
    requestAnimationFrame(animateMagic);
  }else{
    flashEffect();
  }
}

function flashEffect(){
  ctxMagic.fillStyle="rgba(255,255,255,0.8)";
  ctxMagic.fillRect(280,0,120,120);

  setTimeout(()=>{
    text.classList.add("show-text");
    ctxMagic.clearRect(0,0,400,120);
  },150);
}

setTimeout(animateMagic,800);
</script>

<!-- COUNTDOWN -->
<script>
const eventDate = new Date("2026-05-08T20:00:00-03:00").getTime();

function updateCountdown(){
  const now = new Date().getTime();
  const d = eventDate - now;

  if(d<0) return;

  document.getElementById("days").innerHTML = String(Math.floor(d/(1000*60*60*24))).padStart(2,"0");
  document.getElementById("hours").innerHTML = String(Math.floor((d%(1000*60*60*24))/(1000*60*60))).padStart(2,"0");
  document.getElementById("minutes").innerHTML = String(Math.floor((d%(1000*60*60))/(1000*60))).padStart(2,"0");
  document.getElementById("seconds").innerHTML = String(Math.floor((d%(1000*60))/1000)).padStart(2,"0");
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

<script>
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
