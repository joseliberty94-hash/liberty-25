<!-- PARTICULAS -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let particles = [];
const num = 120;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.6;
    this.opacity = Math.random();
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > w) this.speedX *= -1;
    if (this.y < 0 || this.y > h) this.speedY *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,200,255,${this.opacity})`;
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < num; i++) particles.push(new Particle());
}

function animate() {
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

init();
animate();
</script>

<script>
const canvasFairy = document.getElementById("fairyTrail");
const ctxFairy = canvasFairy.getContext("2d");

let wF = canvasFairy.width = window.innerWidth;
let hF = canvasFairy.height = window.innerHeight;

window.addEventListener("resize", ()=>{
  wF = canvasFairy.width = window.innerWidth;
  hF = canvasFairy.height = window.innerHeight;
});

/* PARTÍCULAS */
let fairyParticles = [];

class Fairy {
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.size = Math.random()*2+1;
    this.vx = (Math.random()-0.5)*1.5;
    this.vy = (Math.random()-0.5)*1.5;
    this.life = 50;
  }

  update(){
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
  }

  draw(){
    ctxFairy.beginPath();
    ctxFairy.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctxFairy.fillStyle = `rgba(255,255,180,${this.life/50})`;
    ctxFairy.fill();
  }
}

/* DETECTAR POSICIÓN REAL DEL TEXTO */
function getTextPosition(){
  const text = document.querySelector(".logo-title span");
  const rect = text.getBoundingClientRect();
  return {
    x: rect.left + rect.width/2,
    y: rect.top + rect.height/2
  };
}

/* CAMINO DINÁMICO */
let current = {x:50, y:hF*0.7};
let targetPoints = [];

function buildPath(){
  const textPos = getTextPosition();

  targetPoints = [
    {x:50, y:hF*0.8},
    {x:wF*0.3, y:hF*0.2},
    {x:wF*0.7, y:hF*0.7},
    {x:wF*0.9, y:hF*0.3},
    textPos // destino final exacto
  ];
}

let step = 0;

/* ANIMACIÓN */
function animateFairy(){

  // LIMPIAR SUAVE (sin oscurecer fondo)
  ctxFairy.clearRect(0,0,wF,hF);

  let target = targetPoints[step+1];

  let dx = target.x - current.x;
  let dy = target.y - current.y;

  // velocidad más rápida ⚡
  current.x += dx * 0.10;
  current.y += dy * 0.10;

  // generar polvo
  for(let i=0;i<8;i++){
    fairyParticles.push(new Fairy(current.x,current.y));
  }

  // dibujar partículas
  fairyParticles.forEach((p,i)=>{
    p.update();
    p.draw();
    if(p.life<=0) fairyParticles.splice(i,1);
  });

  // avanzar camino
  if(Math.abs(dx)<5 && Math.abs(dy)<5){
    step++;
    if(step >= targetPoints.length-1){
      revealText();
      return;
    }
  }

  requestAnimationFrame(animateFairy);
}

/* REVELAR TEXTO SIN CUADRO */
function revealText(){
  const text = document.querySelector(".logo-title span");

  // pequeño destello puntual (sin cuadro)
  for(let i=0;i<40;i++){
    fairyParticles.push(new Fairy(current.x,current.y));
  }

  setTimeout(()=>{
    text.classList.add("show-25");
  },100);

  // limpiar suavemente después
  setTimeout(()=>{
    ctxFairy.clearRect(0,0,wF,hF);
  },800);
}

/* INICIAR */
setTimeout(()=>{
  buildPath();
  animateFairy();
},600);
</script>

<!-- COUNTDOWN -->
<script>
const eventDate = new Date("2026-05-08T20:00:00-03:00").getTime();

const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

function updateCountdown(){
  const now = new Date().getTime();
  const distance = eventDate - now;

  if(distance < 0) return;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  daysEl.innerHTML = String(days).padStart(2,"0");
  hoursEl.innerHTML = String(hours).padStart(2,"0");
  minutesEl.innerHTML = String(minutes).padStart(2,"0");
  secondsEl.innerHTML = String(seconds).padStart(2,"0");
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>
