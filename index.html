<!-- PARTICULAS -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let particles = [];
const num = 120;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.6;
    this.opacity = Math.random();
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > w) this.speedX *= -1;
    if (this.y < 0 || this.y > h) this.speedY *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,200,255,${this.opacity})`;
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < num; i++) particles.push(new Particle());
}

function animate() {
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

init();
animate();
</script>

<script>
const canvasFairy = document.getElementById("fairyTrail");
const ctxFairy = canvasFairy.getContext("2d");

let wF = canvasFairy.width = window.innerWidth;
let hF = canvasFairy.height = window.innerHeight;

window.addEventListener("resize", ()=>{
  wF = canvasFairy.width = window.innerWidth;
  hF = canvasFairy.height = window.innerHeight;
});

/* PARTÍCULAS */
let fairyParticles = [];

class Fairy {
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.size = Math.random()*2+1;
    this.vx = (Math.random()-0.5)*1.2;
    this.vy = (Math.random()-0.5)*1.2;
    this.life = 40;
  }

  update(){
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
  }

  draw(){
    ctxFairy.beginPath();
    ctxFairy.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctxFairy.fillStyle = `rgba(220,230,255,${this.life/40})`;
    ctxFairy.fill();
  }
}

/* CENTRO DEL LOGO */
function getLogoCenter(){
  const logo = document.querySelector(".logo-title");
  const rect = logo.getBoundingClientRect();
  return {
    x: rect.left + rect.width/2,
    y: rect.top + rect.height/2
  };
}

/* ESPIRAL */
let angle = 0;

function animateSpiral(){

  ctxFairy.clearRect(0,0,wF,hF);

  const center = getLogoCenter();

  const logo = document.querySelector(".logo-title");
const rect = logo.getBoundingClientRect();

// radio basado en tamaño real del logo 🔥
let baseRadius = Math.max(rect.width, rect.height) * 0.6;

// espiral que envuelve todo el logo
let radius = baseRadius - angle * (baseRadius / 10);

// mínimo para cerrar en el centro
if(radius < 8) radius = 8;

  let x = center.x + Math.cos(angle) * radius;
  let y = center.y + Math.sin(angle) * radius;

  // generar polvo
  for(let i=0;i<10;i++){
    fairyParticles.push(new Fairy(x,y));
  }

  // dibujar partículas
  fairyParticles.forEach((p,i)=>{
    p.update();
    p.draw();
    if(p.life<=0) fairyParticles.splice(i,1);
  });

  angle += 0.25;

  // cuando termina la espiral
  if(angle > Math.PI * 3){
    revealText(center);
    return;
  }

  requestAnimationFrame(animateSpiral);
}

/* REVELAR TEXTO */
function revealText(center){
  const text = document.querySelector(".logo-title span");

  // pequeña explosión inicial ✨
  for(let i=0;i<40;i++){
    fairyParticles.push(new Fairy(center.x, center.y));
  }

  // mostrar texto
  setTimeout(()=>{
    text.classList.add("show-25");
  },80);

  // 💨 DESVANECER SUAVEMENTE EL POLVO
  let fade = 1;

  function fadeOut(){
    fade -= 0.05;

    ctxFairy.fillStyle = `rgba(0,0,0,${1 - fade})`;
    ctxFairy.fillRect(0,0,wF,hF);

    fairyParticles.forEach((p,i)=>{
      p.update();
      ctxFairy.beginPath();
      ctxFairy.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctxFairy.fillStyle = `rgba(220,230,255,${(p.life/40)*fade})`;
      ctxFairy.fill();

      if(p.life<=0) fairyParticles.splice(i,1);
    });

    if(fade > 0){
      requestAnimationFrame(fadeOut);
    } else {
      // limpiar todo completamente
      ctxFairy.clearRect(0,0,wF,hF);
      fairyParticles = [];
    }
  }

  setTimeout(()=>{
    fadeOut();
  },150); // empieza a desaparecer rápido
}

/* INICIAR */
setTimeout(()=>{
  animateSpiral();
},600);
</script>
<!-- COUNTDOWN -->
<script>
const eventDate = new Date("2026-05-08T20:00:00-03:00").getTime();

const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

function updateCountdown(){
  const now = new Date().getTime();
  const distance = eventDate - now;

  if(distance < 0) return;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  daysEl.innerHTML = String(days).padStart(2,"0");
  hoursEl.innerHTML = String(hours).padStart(2,"0");
  minutesEl.innerHTML = String(minutes).padStart(2,"0");
  secondsEl.innerHTML = String(seconds).padStart(2,"0");
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>
