<!-- PARTICULAS FONDO -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let particles = [];
const num = 120;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

class Particle {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.6;
    this.speedY = (Math.random() - 0.5) * 0.6;
    this.opacity = Math.random();
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > w) this.speedX *= -1;
    if (this.y < 0 || this.y > h) this.speedY *= -1;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,200,255,${this.opacity})`;
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < num; i++) particles.push(new Particle());
}

function animateParticles() {
  ctx.clearRect(0, 0, w, h);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}

init();
animateParticles();
</script>

<!-- ✨ ESCRITURA CON POLVO -->
<script>
const fairyCanvas = document.getElementById("fairyCanvas");
const fctx = fairyCanvas.getContext("2d");

let fw = fairyCanvas.width = window.innerWidth;
let fh = fairyCanvas.height = window.innerHeight;

window.addEventListener("resize", ()=>{
  fw = fairyCanvas.width = window.innerWidth;
  fh = fairyCanvas.height = window.innerHeight;
});

let trail = [];
let points = [];
let head = {x:0,y:0};

/* GENERAR TEXTO */
function getTextPoints(el){
  const rect = el.getBoundingClientRect();

  const temp = document.createElement("canvas");
  const tctx = temp.getContext("2d");

  temp.width = rect.width;
  temp.height = rect.height;

  tctx.fillStyle = "#fff";
  tctx.font = "700 48px Inter";
  tctx.textAlign = "center";
  tctx.textBaseline = "middle";
  tctx.fillText("25 AÑOS", rect.width/2, rect.height/2);

  const data = tctx.getImageData(0,0,temp.width,temp.height);

  let pts = [];

  for(let y=0;y<data.height;y+=3){
    for(let x=0;x<data.width;x+=3){
      const i = (y * data.width + x) * 4;
      if(data.data[i+3] > 128){
        pts.push({x: rect.left + x, y: rect.top + y});
      }
    }
  }

  // orden tipo escritura real (líneas)
  return pts.sort((a,b)=>{
    if(Math.abs(a.y - b.y) < 6){
      return a.x - b.x;
    }
    return a.y - b.y;
  });
}

/* ANIMACIÓN */
function writeText(){
  const text = document.querySelector(".logo-title span");
  points = getTextPoints(text);

  let i = 0;

  // punto inicial (izquierda del texto)
  head.x = points[0].x - 40;
  head.y = points[0].y;

  function animate(){

    fctx.clearRect(0,0,fw,fh);

    // dibujar estela
    trail.forEach((p,index)=>{
      fctx.beginPath();
      fctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      fctx.fillStyle = `rgba(200,210,220,${p.life})`;
      fctx.fill();

      p.life -= 0.015;
      p.size *= 0.99;

      if(p.life <= 0){
        trail.splice(index,1);
      }
    });

    // mover la "punta"
    if(i < points.length){
      let target = points[i];

      head.x += (target.x - head.x) * 0.2;
      head.y += (target.y - head.y) * 0.2;

      trail.push({
        x: head.x,
        y: head.y,
        life: 1,
        size: 2.5
      });

      // avanzar más natural
      if(Math.hypot(head.x - target.x, head.y - target.y) < 1){
        i++;
      }
    }

    // ✨ dibujar punta brillante
    fctx.beginPath();
    fctx.arc(head.x, head.y, 3, 0, Math.PI*2);
    fctx.fillStyle = "rgba(255,255,255,0.95)";
    fctx.fill();

    if(i < points.length || trail.length > 0){
      requestAnimationFrame(animate);
    } else {
      text.style.opacity = 1;

      setTimeout(()=>{
        fctx.clearRect(0,0,fw,fh);
      },300);
    }
  }

  animate();
}

window.onload = ()=>{
  setTimeout(writeText,600);
};
</script>
<!-- COUNTDOWN -->
<script>
const eventDate = new Date("2026-05-08T20:00:00-03:00").getTime();

const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

function updateCountdown(){
  const now = new Date().getTime();
  const distance = eventDate - now;

  if(distance < 0){
    daysEl.innerHTML = "00";
    hoursEl.innerHTML = "00";
    minutesEl.innerHTML = "00";
    secondsEl.innerHTML = "00";
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  daysEl.innerHTML = String(days).padStart(2,"0");
  hoursEl.innerHTML = String(hours).padStart(2,"0");
  minutesEl.innerHTML = String(minutes).padStart(2,"0");
  secondsEl.innerHTML = String(seconds).padStart(2,"0");
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>
